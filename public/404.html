<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting — KEVGENGA Portfolio</title>
    <script>
      (function (location) {
        const pathSegmentsToKeep = 1;
        const basePath = location.pathname
          .split("/")
          .slice(0, pathSegmentsToKeep + 1)
          .join("/");
        const route = location.pathname
          .split("/")
          .slice(pathSegmentsToKeep + 1)
          .join("/")
          .replace(/&/g, "~and~");
        const query = location.search
          ? `&${location.search.slice(1).replace(/&/g, "~and~")}`
          : "";

        location.replace(
          `${location.protocol}//${location.host}${basePath}/?/${route}${query}${location.hash}`,
        );
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
